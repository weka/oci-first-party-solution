title: "WEKA on OKE — All-in-one (cluster + operator)"
description: >-
  One-click stack: provisions the OKE cluster and installs the WEKA operator,
  image pull secret, and WekaPolicy/WekaCluster/WekaClient in a single apply.
  Pick the worker flavor below (production = local-NVMe workers, default, sized
  by target capacity; non-production = block-volume drives, for trying out the
  CSI driver / operator).
schemaVersion: 1.1.0
version: "20240101"
locale: "en"

# WEKA logo on the Application Information tab, embedded as a base64 data URI.
# ORM does not render arbitrary external logo URLs for non-Marketplace stacks
# (only Marketplace content URLs), so the SVG is inlined here.
logoUrl: "data:image/svg+xml;base64,"

# Blue info box on the Create stack page — prerequisites + the production-capacity
# caveat, shown before the user runs anything.
informationalText: >-
  Prerequisites: a get.weka.io robot account (quay.io username + password) for the
  image pull secret. Choose a flavor below — non-production uses block-volume
  drives with abundant quota (best for trying the CSI driver / operator), while
  production uses local-NVMe DenseIO workers sized by target capacity. NVMe
  capacity is scarce: if a production apply fails with "Out of host capacity", try
  another region, pin an availability domain, or fall back to non-production.
  After apply, the Application Information tab gives you a one-click kubeconfig
  command and a link straight to the cluster.

variableGroups:
  - title: "Hidden"
    visible: false
    variables:
      - config_file_profile
      - oci_cli_auth
      - region
      - home_region
      - tenancy_ocid
      - compartment_ocid
      - control_plane_allowed_cidrs
      - vcn_cidrs
      - subnets
      - nsgs
      - ssh_public_key_path
      # Cluster identity/version knobs — sensible defaults, not customer-facing.
      - cluster_name
      - kubernetes_version
      - cluster_type
      - cni_type
      # Worker node internals — derived from flavor / fixed WEKA requirements.
      - node_pool_name
      - node_boot_volume_gb
      - node_hugepages
      - worker_image_os_version
      # Advanced sizing overrides — derived from flavor by default; not shown.
      - node_shape
      - node_ocpus
      - node_memory_gb
      - worker_placement_ads
      # Non-production block-volume size — fixed default, not customer-facing.
      - data_volume_gb

  - title: "WEKA (operator + image pull)"
    variables:
      - quay_username
      - quay_password
      - operator_version

  - title: "WEKA cluster sizing"
    variables:
      - flavor
      - target_usable_tb
      - target_usable_tb_custom
      - node_count
      - skip_capacity_preflight

  - title: "Kubernetes API"
    variables:
      - control_plane_is_public

  - title: "Networking"
    variables:
      - create_vcn
      - vcn_id

  - title: "SSH"
    variables:
      - ssh_public_key

variables:
  # --- WEKA ---
  quay_username:
    title: quay.io robot username
    description: From https://get.weka.io. Used for the image pull secret.
    type: string
    required: true
  quay_password:
    title: quay.io robot password
    description: From https://get.weka.io.
    type: password
    required: true
    sensitive: true
  operator_version:
    title: WEKA operator version
    type: string
    default: v1.14.1
    required: true

  # --- Cluster sizing ---
  flavor:
    title: Cluster flavor
    description: >-
      production (default): local-NVMe workers with the best IO, sized by the target
      usable capacity below; NVMe capacity is limited, so check availability-domain
      capacity before provisioning. non-production: block-volume drives with abundant
      quota. This is NOT for performance — use it to see how the WEKA CSI driver and
      operator behave.
    type: enum
    enum: [non-production, production]
    default: production
    required: true
  target_usable_tb:
    title: Target usable capacity
    description: >-
      Production only. Pick a target usable capacity; the bracketed number is how
      many servers it maps to. Options 6-19 servers (~18-97 TB) run single
      protection ("x+2+1", survives 2 concurrent failures). The last option,
      21 servers, stays at ~98 TB usable but is the smallest cluster that gets
      double protection ("16+4+1", survives 4 concurrent failures) — pick it for
      resilience rather than more space. To size a bigger cluster than these
      presets, leave this at the default and fill "Custom target capacity" below.
      The derived scheme + capacity are shown in the weka_sizing output after Plan.
    type: enum
    enum:
      - "18 TB (6 servers)"
      - "24 TB (7 servers)"
      - "30 TB (8 servers)"
      - "36 TB (9 servers)"
      - "42 TB (10 servers)"
      - "48 TB (11 servers)"
      - "55 TB (12 servers)"
      - "61 TB (13 servers)"
      - "67 TB (14 servers)"
      - "73 TB (15 servers)"
      - "79 TB (16 servers)"
      - "85 TB (17 servers)"
      - "91 TB (18 servers)"
      - "97 TB (19 servers)"
      - "98 TB (21 servers — double protection)"
    default: "18 TB (6 servers)"
    required: true
    visible:
      eq:
        - flavor
        - production
  target_usable_tb_custom:
    title: Custom target capacity (TB)
    description: >-
      Production only, optional. Leave empty to use the dropdown above. Enter a TB
      number to size a larger cluster than the presets offer (more servers) — this
      overrides the dropdown.
    type: number
    minimum: 1
    required: false
    visible:
      eq:
        - flavor
        - production
  skip_capacity_preflight:
    title: Skip NVMe capacity preflight
    description: >-
      Production only. Before building, the stack checks DenseIO host capacity
      across the region's availability domains and stops early with guidance if
      none is free. Turn this on to bypass that check — e.g. if the capacity
      report is wrong for your tenancy, or you lack permission to read it.
    type: boolean
    default: false
    visible:
      eq:
        - flavor
        - production
  node_count:
    title: Instance count
    description: >-
      Non-production only. Number of worker instances (minimum 6, enough for WEKA
      to form a cluster). Capacity comes from a per-node block volume, so the
      instance count just sets how many nodes make up the cluster.
    type: number
    default: 6
    minimum: 6
    required: true
    visible:
      eq:
        - flavor
        - non-production

  # --- Kubernetes API ---
  control_plane_is_public:
    title: Public API endpoint
    description: Give the Kubernetes API a public IP so kubectl works directly. Tighten control_plane_allowed_cidrs for real use.
    type: boolean
    default: true

  # --- Networking ---
  create_vcn:
    title: Create a fresh VCN
    description: Off = reuse an existing VCN (set vcn_id, and subnets/nsgs via tfvars).
    type: boolean
    default: true
    required: true
  vcn_id:
    title: Existing VCN
    description: Only used when "Create a fresh VCN" is off.
    type: oci:core:vcn:id
    required: false
    visible:
      not:
        - create_vcn
    dependsOn:
      compartmentId: ${compartment_ocid}

  # --- SSH ---
  ssh_public_key:
    title: SSH public key
    description: Public key injected into worker nodes (paste the contents of your .pub file).
    type: oci:core:ssh:publickey
    required: false

# ---------------------------------------------------------------------------
# Application Information tab — shown after a successful apply. Declaring the
# outputs here (with types) turns the raw Terraform outputs into a polished
# panel: a primary "Go to cluster" button, copy-buttons for the commands, and a
# grouped summary. Every name below must match an output in outputs.tf.
# ---------------------------------------------------------------------------
outputs:
  console_url:
    type: link
    title: "Open the OKE cluster in the OCI Console"
    visible: true
  create_kubeconfig_command:
    type: copyableString
    title: "Write a kubeconfig (run locally)"
    visible: true
  verify_commands:
    type: copyableString
    title: "Verify WEKA came up"
    visible: true
  weka_sizing:
    type: string
    title: "Derived WEKA sizing"
    visible: true
  cluster_id:
    type: copyableString
    title: "Cluster OCID"
    visible: true
  region:
    type: string
    title: "Region"
    visible: true
  operator_namespace:
    type: string
    title: "WEKA operator namespace"
    visible: true
  applied_custom_resources:
    type: string
    title: "Applied WEKA custom resources"
    visible: true

outputGroups:
  - title: "Access your cluster"
    outputs:
      - console_url
      - create_kubeconfig_command
      - verify_commands
  - title: "Cluster details"
    outputs:
      - weka_sizing
      - cluster_id
      - region
      - operator_namespace
      - applied_custom_resources

# Primary call-to-action button on the Application Information tab.
primaryOutputButton: console_url
