title: "WEKA on OKE — Infrastructure"
description: >-
  Managed OKE cluster (converged node pool) prepared for WEKA: hugepages,
  DenseIO local NVMe, and the intra-VCN data-plane security list. Layer the WEKA
  operator on top afterwards with the companion "weka-layer" stack.
schemaVersion: 1.1.0
version: "20240101"
locale: "en"

# Variables ORM injects or that are advanced/tfvars-only; hidden from the form.
variableGroups:
  - title: "Hidden"
    visible: false
    variables:
      - config_file_profile
      - oci_cli_auth
      - region
      - home_region
      - control_plane_allowed_cidrs
      - vcn_cidrs
      - subnets
      - nsgs
      - ssh_public_key_path

  - title: "Identity"
    variables:
      - compartment_id
      - tenancy_id

  - title: "Cluster"
    variables:
      - cluster_name
      - kubernetes_version
      - cluster_type
      - cni_type
      - control_plane_is_public

  - title: "Worker node pool (converged WEKA nodes)"
    variables:
      - node_pool_name
      - node_count
      - node_shape
      - node_ocpus
      - node_memory_gb
      - node_boot_volume_gb
      - node_hugepages
      - worker_image_os_version

  - title: "Networking"
    variables:
      - create_vcn
      - vcn_id

  - title: "SSH"
    variables:
      - ssh_public_key

variables:
  # --- Identity ---
  compartment_id:
    title: Compartment
    description: Compartment where OKE resources are created.
    type: oci:identity:compartment:id
    required: true
  tenancy_id:
    title: Tenancy
    type: oci:identity:compartment:id
    required: true

  # --- Cluster ---
  cluster_name:
    title: Cluster name
    type: string
    required: true
    default: weka-oke
  kubernetes_version:
    title: Kubernetes version
    type: string
    required: true
    default: v1.34.2
  cluster_type:
    title: Cluster type
    type: enum
    enum: [basic, enhanced]
    default: basic
    required: true
  cni_type:
    title: Pod networking (CNI)
    type: enum
    enum: [flannel, npn]
    default: flannel
    required: true
  control_plane_is_public:
    title: Public API endpoint
    description: Give the Kubernetes API a public IP so kubectl works directly. Tighten control_plane_allowed_cidrs for real use.
    type: boolean
    default: true

  # --- Workers ---
  node_pool_name:
    title: Node pool name
    type: string
    default: converged
    required: true
  node_count:
    title: Worker count
    type: number
    default: 6
    minimum: 1
    required: true
  node_shape:
    title: Worker shape
    description: DenseIO gives local NVMe for WEKA drives.
    type: string
    default: VM.DenseIO.E5.Flex
    required: true
  node_ocpus:
    title: OCPUs per node
    description: VM.DenseIO.E5.Flex accepts 8/16/24/32/40/48 (1 NVMe per 8 OCPU). 16 = 2 NVMe + enough cores for WEKA.
    type: number
    default: 16
    required: true
  node_memory_gb:
    title: Memory (GB) per node
    description: VM.DenseIO.E5.Flex requires 12 GB/OCPU (16 OCPU => 192 GB).
    type: number
    default: 192
    required: true
  node_boot_volume_gb:
    title: Boot volume (GB)
    type: number
    default: 200
    required: true
  node_hugepages:
    title: 2Mi hugepages per node
    description: WEKA requirement. 8000 x 2Mi ~= 15.6 GB.
    type: number
    default: 8000
    required: true
  worker_image_os_version:
    title: Worker OS version
    description: Oracle Linux 8 avoids the broken Ubuntu-OKE python3-venv that blocks node init.
    type: string
    default: "8"
    required: true

  # --- Networking ---
  create_vcn:
    title: Create a fresh VCN
    description: Off = reuse an existing VCN (set vcn_id, and subnets/nsgs via tfvars).
    type: boolean
    default: true
    required: true
  vcn_id:
    title: Existing VCN
    description: Only used when "Create a fresh VCN" is off.
    type: oci:core:vcn:id
    required: false
    visible:
      not:
        - create_vcn
    dependsOn:
      compartmentId: ${compartment_id}

  # --- SSH ---
  ssh_public_key:
    title: SSH public key
    description: Public key injected into worker nodes (paste the contents of your .pub file).
    type: oci:core:ssh:publickey
    required: false
