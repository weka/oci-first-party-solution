title: "WEKA on OKE — All-in-one (cluster + operator)"
description: >-
  One-click stack: provisions the OKE cluster and installs the WEKA operator,
  image pull secret, and WekaPolicy/WekaCluster/WekaClient in a single apply.
  Pick the worker flavor below (non-production = Standard + block volume,
  default; production = DenseIO + local NVMe, sized by target capacity).
schemaVersion: 1.1.0
version: "20240101"
locale: "en"

variableGroups:
  - title: "Hidden"
    visible: false
    variables:
      - config_file_profile
      - oci_cli_auth
      - region
      - home_region
      - tenancy_ocid
      - compartment_ocid
      - control_plane_allowed_cidrs
      - vcn_cidrs
      - subnets
      - nsgs
      - ssh_public_key_path
      # Cluster identity/version knobs — sensible defaults, not customer-facing.
      - cluster_name
      - kubernetes_version
      - cluster_type
      - cni_type
      # Worker node internals — derived from flavor / fixed WEKA requirements.
      - node_pool_name
      - node_boot_volume_gb
      - node_hugepages
      - worker_image_os_version

  - title: "WEKA (operator + image pull)"
    variables:
      - quay_username
      - quay_password
      - operator_version

  - title: "WEKA cluster sizing"
    variables:
      - flavor
      - target_usable_tb
      - node_count
      - data_volume_gb

  - title: "Kubernetes API"
    variables:
      - control_plane_is_public

  - title: "Networking"
    variables:
      - create_vcn
      - vcn_id

  - title: "SSH"
    variables:
      - ssh_public_key

variables:
  # --- WEKA ---
  quay_username:
    title: quay.io robot username
    description: From https://get.weka.io. Used for the image pull secret.
    type: string
    required: true
  quay_password:
    title: quay.io robot password
    description: From https://get.weka.io.
    type: password
    required: true
    sensitive: true
  operator_version:
    title: WEKA operator version
    type: string
    default: v1.14.1
    required: true

  # --- Cluster sizing ---
  flavor:
    title: Cluster flavor
    description: >-
      non-production (VM.Standard.E5.Flex — instance-pool, block-volume drives):
      abundant quota, good for operator/CSI testing; you set the instance count
      and per-node block-volume size. production (VM.DenseIO.E5.Flex — node-pool,
      local NVMe): best IO, sized by target usable capacity; DenseIO quota is
      limited (check AD capacity).
    type: enum
    enum: [non-production, production]
    default: non-production
    required: true
  target_usable_tb:
    title: Target usable capacity (TB)
    description: >-
      Production only. The worker count is derived from this. Each VM.DenseIO.E5.Flex
      node adds 1 × 6.8 TB NVMe. Protection adapts to cluster size: "x+2+1" below 21
      nodes (stripe width x + 2 redundancy + 1 hot spare; ~6.12 TB usable per data
      drive) and "16+4+1" at 21+ nodes, since double protection needs 16+4+1 = 21
      servers — then it keeps scaling past 21 at ~4.9 TB usable/node. Reference
      points: ~18 TB at the 6-node minimum (3+2+1), ~43 TB at 10 nodes (7+2+1),
      ~98 TB at 19-21 nodes. The exact scheme + capacity of the derived cluster is
      shown in the weka_sizing output after Plan.
    type: number
    default: 18
    minimum: 1
    required: true
    visible:
      eq:
        - flavor
        - production
  node_count:
    title: Instance count
    description: >-
      Non-production only. Number of VM.Standard.E5.Flex worker instances. WEKA
      needs enough nodes to form a cluster (minimum 6). Capacity comes from the
      per-node block volume below, not the instance count.
    type: number
    default: 6
    minimum: 6
    required: true
    visible:
      eq:
        - flavor
        - non-production
  data_volume_gb:
    title: Data volume size (GB)
    description: >-
      Non-production only. Size of the paravirtualized block-volume data disk
      attached per worker node (VM.Standard.E5.Flex + instance-pool). Ignored for
      production (local NVMe is used instead). Minimum 50.
    type: number
    default: 100
    minimum: 50
    required: false
    visible:
      eq:
        - flavor
        - non-production

  # --- Kubernetes API ---
  control_plane_is_public:
    title: Public API endpoint
    description: Give the Kubernetes API a public IP so kubectl works directly. Tighten control_plane_allowed_cidrs for real use.
    type: boolean
    default: true

  # --- Networking ---
  create_vcn:
    title: Create a fresh VCN
    description: Off = reuse an existing VCN (set vcn_id, and subnets/nsgs via tfvars).
    type: boolean
    default: true
    required: true
  vcn_id:
    title: Existing VCN
    description: Only used when "Create a fresh VCN" is off.
    type: oci:core:vcn:id
    required: false
    visible:
      not:
        - create_vcn
    dependsOn:
      compartmentId: ${compartment_ocid}

  # --- SSH ---
  ssh_public_key:
    title: SSH public key
    description: Public key injected into worker nodes (paste the contents of your .pub file).
    type: oci:core:ssh:publickey
    required: false
